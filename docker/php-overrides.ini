; Joomla 1.5 + ext/mysql expect old-PHP error verbosity. Hide the
; deprecation/strict noise from PHP 5.6 so pages render instead of
; breaking on "headers already sent" after a wall of E_DEPRECATED.
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT & ~E_NOTICE
display_errors = On

memory_limit = 256M
upload_max_filesize = 32M
post_max_size = 32M
max_execution_time = 120
date.timezone = America/Sao_Paulo
